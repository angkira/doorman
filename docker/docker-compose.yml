version: '3.8'
services:
  onnx-inference:
    build:
      context: .
      dockerfile: Dockerfile.onnx-rocm
    container_name: doorman-onnx-rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    volumes:
      - ../models:/app/models:ro
      - /opt/rocm:/opt/rocm:ro
      - /tmp:/tmp  # Unix socket communication
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.1
      - HIP_VISIBLE_DEVICES=0
      - DOORMAN_SOCKET=/tmp/doorman-ml.sock
      - MODELS_DIR=/app/models
      - DEVICE=cuda
    # No ports needed for Unix socket!
    restart: unless-stopped
