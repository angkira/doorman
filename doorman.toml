# doorman Configuration

[daemon]
# SYSTEM-mode command socket. Lives under /run/doorman/ (systemd
# RuntimeDirectory=doorman, owned by the `doorman` user) so the sandboxed
# service can bind it under ProtectSystem=strict. Must match the PAM module /
# CLI default (doorman_shared::SOCKET_PATH). --user dev mode overrides with XDG.
socket_path = "/run/doorman/doorman.sock"
data_dir = "/var/lib/doorman"
log_level = "info"

[camera]
device_index = 0
width = 1024   # Camera native resolution (verified with FFmpeg test)
height = 720
fps = 30
# video_file = "data/test.mp4"  # For testing with video files

[ml]
models_dir = "/var/lib/doorman/models"

# Backend: "tract" (pure Rust, default) or "ort" (ONNX Runtime, supports GPU)
backend = "tract"

# Device: "cpu", "cuda", "rocm" (only for ort backend)
device = "cpu"

cpu_threads = 0  # 0 = auto
gpu_device_id = 0

[authentication]
similarity_threshold = 0.75  # MAX-security setpoint (raised from 0.65). Validated on LFW + real-binary
                             # video: live genuine 0.85-0.88, worst impostor 0.52 -> 100% genuine /
                             # 0% false-accept under Phase-1 aggregation. See docs/threshold_security_analysis.md.
auth_frames = 10
timeout_secs = 3

[enrollment]
enroll_frames = 20
min_valid_frames = 5

[preprocessing]
image_width = 256
image_height = 256
filter_type = "lanczos3"  # nearest, triangle, catmullrom, gaussian, lanczos3

# Model specifications.
#
# NOTE: the active model parameters live in code (daemon `ml/model_config.rs`):
#   - Detector:   YuNet (face_detection_yunet_2023mar.onnx), 640x640, MIT
#   - Recognizer: EdgeFace-S (edgeface_s.onnx), 112x112, 512-d,
#                 CC-BY-NC-SA 4.0 (non-commercial)
#   - Liveness:   MiniFASNetV2-SE (minifasnet_v2se.onnx), 128x128, Apache-2.0
# The values below are retained for forward-compat and are not consumed by the
# shipped backend.
[models]
recognizer_input_width = 112
recognizer_input_height = 112
recognizer_embedding_size = 512
