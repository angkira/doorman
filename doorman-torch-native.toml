# Doorman with Native PyTorch backend (PyO3, no IPC)
# Maximum performance: direct ONNX Runtime calls from Rust

[ml]
backend = "torch-native"
device = "cuda"
models_dir = "/home/angkira/.local/share/doorman/models"
cpu_threads = 4
confidence_threshold = 0.7
liveness_threshold = 0.5
similarity_threshold = 0.6

[camera]
backend = "gstreamer"
device = "/dev/video0"
width = 1280
height = 720
format = "RGB"
fps = 30

[recognition]
enable_liveness = true
enable_debug_stream = true
debug_stream_port = 9876
max_faces = 1

[daemon]
socket_path = "/run/user/1000/doorman.sock"
debug_socket = "/run/user/1000/doorman-debug.sock"
frame_socket = "/run/user/1000/doorman-frames.sock"
data_dir = "/home/angkira/.local/share/doorman"
log_level = "info"
user_mode = true
debug_mode = false
preview_mode = false

[pam]
service_name = "doorman"
socket_path = "/tmp/doorman.sock"
timeout_seconds = 30

[storage]
embeddings_path = "/home/angkira/.local/share/doorman/embeddings"

[logging]
level = "info"
