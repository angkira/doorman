# Doorman Configuration - PyTorch Shared Memory Backend
# Zero-copy IPC with GPU acceleration

[ml]
# ML backend selection
backend = "ort"  # PyTorch with shared memory (optimized IPC)
device = "cuda"  # cuda or cpu
models_dir = "~/.local/share/doorman/models"

# Recognition thresholds
face_confidence_threshold = 0.7
liveness_threshold = 0.5
recognition_threshold = 0.6

[daemon]
# Processing FPS for continuous face detection (matches camera FPS for real-time)
processing_fps = 30  # CUDA can handle 30 FPS easily (BlazeFace alone: 1397 FPS!)
user_mode = true
data_dir = "~/.local/share/doorman"
socket_path = "/run/user/1000/doorman.sock"

[camera]
device_id = 0  # Camera device ID
width = 1280
height = 720
fps = 30  # Hardware limit for this camera

[pipeline]
# Pipeline FPS limits - for preview streaming only
preview_fps = 30      # Smooth preview (if using preview mode)

[system]
# System paths
data_dir = "~/.local/share/doorman"
socket_path = "/run/user/1000/doorman.sock"

# User mode (false = system service)
user_mode = true
