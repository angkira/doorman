[ml]
backend = "torch-shm"
device = "cpu"  # CPU-only with shared memory optimization
models_dir = "~/.local/share/doorman/models"

[ml.torch_shm]
# Python executable (uses .venv/bin/python3)
python = "python3"
# Shared memory size for frame transfer (640x480x3 = ~1MB, use 2MB for safety)
shm_size_mb = 2
# Inference timeout
timeout_secs = 5

[camera]
backend = "gstreamer"
width = 640
height = 480
fps = 30
device_index = 0

[pipeline]
detection_fps = 10
preview_fps = 15

[storage]
data_dir = "~/.local/share/doorman"
