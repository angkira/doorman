[camera]
source = "gstreamer"
device = "/dev/video0"
width = 1024
height = 720
fps = 30
format = "YUY2"

[ml]
backend = "ort"
device = "rocm"
cpu_threads = 4
max_fps = 30

[recognition]
threshold = 0.45
max_distance = 0.55

[liveness]
enabled = true
threshold = 0.5

[unlock]
timeout_ms = 5000

[debug]
enabled = true
show_preview = true
save_frames = false
