[project]
name = "doorman"
version = "0.1.0"
description = "Secure face unlock system for Linux"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.15.0",
    "rich>=13.9.0",
    "insightface>=0.7.3",
    "onnxruntime>=1.23.0",
    "onnxruntime-gpu>=1.23.2",
    "opencv-python==4.10.0.84",
]

[project.scripts]
doorman = "doorman.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/doorman"]
